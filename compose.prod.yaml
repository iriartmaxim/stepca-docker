# Override de producción.
# Uso: docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Endurece el stack: límites de recursos, sin escalada de privilegios,
# logging rotado. NO publica la Root CA al host (debería estar offline o
# accesible solo en la red interna).
services:
  stepca-root:
    # En producción la Root CA idealmente está OFFLINE: levantarla solo para
    # firmar la intermedia y luego `docker compose stop stepca-root`.
    ports: []                       # no exponer la root al host
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  stepca-intermediate:
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  stepca-ra-one.local:
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
