apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "stepca.fullname" . }}-intermediate
  labels: {{- include "stepca.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "stepca.fullname" . }}-intermediate
  replicas: {{ .Values.intermediate.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: intermediate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: intermediate
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: step-ca
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["step-ca", "--password-file=/run/secrets/intermediate_ca_password.txt", "/home/step/config/ca.json"]
          ports:
            - { name: https, containerPort: 9000 }
          resources: {{- toYaml .Values.intermediate.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: https, scheme: HTTPS }
            initialDelaySeconds: 10
          volumeMounts:
            - { name: data, mountPath: /home/step }
            - { name: secrets, mountPath: /run/secrets, readOnly: true }
      volumes:
        - name: secrets
          secret:
            secretName: {{ include "stepca.secretName" . }}
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.intermediate.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stepca.fullname" . }}-intermediate
  labels: {{- include "stepca.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: intermediate
  ports:
    - { name: https, port: 9000, targetPort: https }
