# HAProxy — balanceo L4 (TCP passthrough) para las réplicas de step-ca.
# TLS lo terminan las CAs; HAProxy sólo reparte conexiones (SNI intacto).
global
  log stdout format raw local0
  maxconn 4096

defaults
  mode tcp
  log global
  option tcplog
  timeout connect 5s
  timeout client  1h
  timeout server  1h

# Resolución dinámica vía el DNS de Docker (las réplicas pueden arrancar después)
resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  hold valid 5s

# ── Intermediate CA (alias de red: stepca-intermediate) ──
frontend fe_intermediate
  bind :9000
  default_backend be_intermediate
backend be_intermediate
  balance roundrobin
  option tcp-check
  default-server inter 5s fall 3 rise 2 resolvers docker init-addr none
  server int1 stepca-int-1:9000 check
  server int2 stepca-int-2:9000 check

# ── Registration Authority (alias de red: stepca-ra-one.local) ──
frontend fe_ra
  bind :9100
  default_backend be_ra
backend be_ra
  balance roundrobin
  option tcp-check
  default-server inter 5s fall 3 rise 2 resolvers docker init-addr none
  server ra1 stepca-ra-1:9100 check
  server ra2 stepca-ra-2:9100 check

# ── Panel de estado de HAProxy (HTTP) ──
frontend fe_stats
  mode http
  bind :8404
  stats enable
  stats uri /
  stats refresh 5s
