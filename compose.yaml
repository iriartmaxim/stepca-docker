# ─────────────────────────────────────────────────────────────────────────────
#  stepca-docker — infraestructura completa, performante y de alta disponibilidad
#  Topología:
#    postgres ── DB compartida (stepca_int / stepca_ra)
#    stepca-root ── Root CA (firma la intermedia)
#    stepca-int-1 / stepca-int-2 ── Intermediate CA (2 réplicas, PostgreSQL)
#    stepca-ra-1  / stepca-ra-2  ── Registration Authority (2 réplicas, PostgreSQL)
#    haproxy ── balanceo L4 (alias stepca-intermediate :9000, stepca-ra-one.local :9100)
#    prometheus + grafana ── observabilidad
#    stepca-ui ── dashboard de administración (sólo lectura)
#  Orquestación: `make up` (scripts/bootstrap.sh) genera configs y levanta en orden.
# ─────────────────────────────────────────────────────────────────────────────
x-stepca-image: &stepca-image ${STEPCA_IMAGE:-smallstep/step-ca:0.28.3}

services:
  # ── PostgreSQL · PRIMARIO ───────────────────────────────────────────────────
  pg-primary:
    image: postgres:16-alpine
    container_name: pg-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-stepca}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-stepca-change-me}
      POSTGRES_DB: stepca
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-repl-change-me}
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./infra/postgres/primary-init.sh:/docker-entrypoint-initdb.d/primary-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d stepca_int && pg_isready -U $${POSTGRES_USER} -d stepca_ra"]
      interval: 10s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1024M }

  # ── PostgreSQL · STANDBY (replicación en streaming) ─────────────────────────
  pg-standby:
    image: postgres:16-alpine
    container_name: pg-standby
    restart: unless-stopped
    depends_on:
      pg-primary: { condition: service_healthy }
    environment:
      POSTGRES_USER: ${PG_USER:-stepca}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-stepca-change-me}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-repl-change-me}
      PGDATA: /var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/usr/local/bin/standby-entry.sh"]
    volumes:
      - pg-standby-data:/var/lib/postgresql/data
      - ./infra/postgres/standby-entry.sh:/usr/local/bin/standby-entry.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1024M }

  # ── Root CA (única; firma la intermedia) ────────────────────────────────────
  stepca-root:
    image: *stepca-image
    container_name: stepca-root
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: ${STEPCA_INIT_NAME:-Maximiliano Iriart}
      DOCKER_STEPCA_INIT_DNS_NAMES: ${STEPCA_INIT_DNS_NAMES:-stepca-root, localhost, 127.0.0.1, rootca.local}
      DOCKER_STEPCA_INIT_PROVISIONER: ${STEPCA_INIT_PROVISIONER:-admin@example.com}
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/ca_password
      ROOT_PASS_FILE: /run/secrets/ca_password
      SUB_PASS_FILE: /run/secrets/subca_password
      INTERMEDIATE_TMP_DIR: /home/step/intermediate_tmp
      CA_URL: https://localhost:9000/health
      INTERMEDIATE_DNS: ${INTERMEDIATE_DNS:-stepca-intermediate}
      INTERMEDIATE_KEY_SIZE: ${INTERMEDIATE_KEY_SIZE:-4096}
      INTERMEDIATE_PROFILE: ${INTERMEDIATE_PROFILE:-intermediate-ca}
      STEPDEBUG: ${STEPDEBUG:-0}
    volumes:
      - config-volume:/home/step/config
      - certs-volume:/home/step/certs
      - secrets-volume:/home/step/secrets
      - ./scripts/init-root.sh:/scripts/init-root.sh:ro
      - intermediate-tmp:/home/step/intermediate_tmp/
    ports:
      - "${ROOT_PORT:-9000}:9000"
    secrets:
      - source: root_ca_password
        target: ca_password
      - source: intermediate_ca_password
        target: subca_password
    command: >
      sh -c "step-ca --password-file=/run/secrets/ca_password /home/step/config/ca.json &
      /scripts/init-root.sh && wait"
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

  # ── Intermediate CA · réplica 1 ─────────────────────────────────────────────
  stepca-int-1: &intermediate
    image: *stepca-image
    container_name: stepca-int-1
    restart: unless-stopped
    depends_on:
      pg-primary: { condition: service_healthy }
      stepca-root: { condition: service_healthy }
    environment:
      ROOT_CA_URL: https://stepca-root:9000/health
      INTERMEDIATE_TMP_DIR: /tmp/intermediate_tmp
      SUB_PASS_FILE: /run/secrets/subca_password
      ROOT_CRT_SRC: /home/step/root_certs/root_ca.crt
    volumes:
      - intermediate-certs:/home/step/certs
      - intermediate-config:/home/step/config
      - intermediate-secrets:/home/step/secrets
      - ./scripts/init-intermediate.sh:/scripts/init-intermediate.sh:ro
      - ./persistent/root/certs:/home/step/root_certs:ro
      - ./infra/stepca/templates:/home/step/templates:ro
      - intermediate-tmp:/tmp/intermediate_tmp/:ro
    secrets:
      - source: intermediate_ca_password
        target: subca_password
    command: >
      sh -c "/scripts/init-intermediate.sh &&
      step-ca --password-file=/run/secrets/subca_password /home/step/config/ca.json"
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

  # ── Intermediate CA · réplica 2 ─────────────────────────────────────────────
  stepca-int-2:
    <<: *intermediate
    container_name: stepca-int-2

  # ── Balanceador L4 ──────────────────────────────────────────────────────────
  haproxy:
    image: haproxy:2.9-alpine
    container_name: stepca-haproxy
    restart: unless-stopped
    depends_on:
      stepca-int-1: { condition: service_started }
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      default:
        aliases:
          - stepca-intermediate
          - stepca-ra-one.local
    ports:
      - "${INTERMEDIATE_PORT:-9001}:9000"
      - "${RA_PORT:-9100}:9100"
      - "${HAPROXY_STATS_PORT:-8404}:8404"
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 128M }

  # ── Registration Authority · réplica 1 ──────────────────────────────────────
  stepca-ra-1: &ra
    image: *stepca-image
    container_name: stepca-ra-1
    restart: unless-stopped
    depends_on:
      pg-primary: { condition: service_healthy }
      haproxy: { condition: service_started }
    volumes:
      - ra1-config:/home/step/config
      - ra1-certs:/home/step/certs
      - ra1-secrets:/home/step/secrets
    command: >
      sh -c "step-ca /home/step/config/ca.json"
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9100", "--root", "/home/step/certs/intermediate_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

  # ── Registration Authority · réplica 2 ──────────────────────────────────────
  stepca-ra-2:
    <<: *ra
    container_name: stepca-ra-2

  # ── Observabilidad ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stepca-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 512M }

  grafana:
    image: grafana/grafana:latest
    container_name: stepca-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana-dashboard.json:/var/lib/grafana/dashboards/stepca.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

  # ── UI de administración (sólo lectura) ─────────────────────────────────────
  stepca-ui:
    build: ./ui
    image: stepca-ui:latest
    container_name: stepca-ui
    restart: unless-stopped
    environment:
      # Token de operador: si está vacío, la emisión queda DESHABILITADA (sólo lectura).
      UI_TOKEN: ${UI_TOKEN:-}
      # Credenciales de sólo lectura para el estado de replicación PostgreSQL
      PG_USER: ${PG_USER:-stepca}
      PG_PASSWORD: ${PG_PASSWORD:-stepca-change-me}
    ports:
      - "${UI_PORT:-8088}:8080"
    volumes:
      - ./persistent/root/certs:/certs/root:ro
      - ./persistent/intermediate/certs:/certs/intermediate:ro
      - ./persistent/intermediate/config:/cfg/intermediate:ro
      - ./persistent/issued:/certs/issued
      # Credencial del provisioner 'web' (emisión segura vía API, sin socket)
      - ./persistent/ui/web_provisioner_password:/run/secrets/web_provisioner_password:ro
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

volumes:
  pg-primary-data:
  pg-standby-data:
  prometheus-data:
  grafana-data:
  config-volume:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/root/config }
  certs-volume:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/root/certs }
  secrets-volume:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/root/secrets }
  intermediate-certs:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/intermediate/certs }
  intermediate-config:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/intermediate/config }
  intermediate-secrets:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/intermediate/secrets }
  intermediate-tmp:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/tmp }
  ra1-config:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/ra/ra-one/config }
  ra1-certs:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/ra/ra-one/certs }
  ra1-secrets:
    driver: local
    driver_opts: { type: none, o: bind, device: ./persistent/ra/ra-one/secrets }

secrets:
  root_ca_password:
    file: ./secrets/root_ca_password.txt
  intermediate_ca_password:
    file: ./secrets/intermediate_ca_password.txt
  ra_password:
    file: ./secrets/ra_password.txt
  admin_password:
    file: ./secrets/admin_password.txt
