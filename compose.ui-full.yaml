# Override para la UI en modo COMPLETO (control + emisión).
# ⚠️ Monta el socket de Docker: la UI puede controlar contenedores y lanzar
# emisiones. Es una superficie privilegiada — usar sólo en entornos de confianza.
# Uso: docker compose -f compose.yaml -f compose.ui-full.yaml up -d --build stepca-ui
services:
  stepca-ui:
    environment:
      UI_READONLY: "0"
    volumes:
      # Se suma a los montajes del base (certs de las CAs e inventario, ya rw)
      - /var/run/docker.sock:/var/run/docker.sock
