# Override para la UI en modo COMPLETO (control + emisión).
# ⚠️ Monta el socket de Docker: la UI puede controlar contenedores y lanzar
# emisiones. Es una superficie privilegiada — usar sólo en entornos de confianza.
# Uso: docker compose -f compose.yaml -f compose.ui.yaml -f compose.ui-full.yaml up -d --build
services:
  stepca-ui:
    environment:
      UI_READONLY: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./persistent/root/certs:/certs/root:ro
      - ./persistent/intermediate/certs:/certs/intermediate:ro
