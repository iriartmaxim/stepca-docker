# nginx sirviendo TLS con un certificado emitido por la PKI.
# Emitir antes:  step ca certificate miapp.local miapp.crt miapp.key \
#                  --provisioner acme --ca-url https://stepca-ra-one.local:9100
server {
    listen 443 ssl;
    http2 on;
    server_name miapp.local;

    # La cadena debe incluir el certificado intermedio
    ssl_certificate     /etc/ssl/miapp.crt;
    ssl_certificate_key /etc/ssl/miapp.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}

server {
    listen 80;
    server_name miapp.local;
    return 301 https://$host$request_uri;
}
