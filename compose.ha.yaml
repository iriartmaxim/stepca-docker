# Override de alta disponibilidad: mueve la DB de la intermedia de badger
# embebido a PostgreSQL externo, permitiendo escalar la intermedia.
# Uso: docker compose -f compose.yaml -f compose.ha.yaml up -d
#
# Requiere ajustar el ca.json de la intermedia para usar:
#   "db": { "type": "postgresql", "dataSource": "postgresql://stepca:...@postgres:5432/stepca" }
# Ver docs/scaling.md.
services:
  postgres:
    image: postgres:16-alpine
    container_name: stepca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-stepca}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme-pg}
      POSTGRES_DB: ${PG_DB:-stepca}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  stepca-intermediate:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresql
      DB_DATASOURCE: postgresql://${PG_USER:-stepca}:${PG_PASSWORD:-changeme-pg}@postgres:5432/${PG_DB:-stepca}

volumes:
  pg-data:
